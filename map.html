<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isotope — Where's the Team</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #008BFF;
    --blue-light: #EBF5FF;
    --blue-border: #B3D9FF;
    --bg: #FFFFFF;
    --map-border: #E9E9E9;
    --white: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #9B9B9B;
    --border: #E8E8E6;
    --shadow-card: 0 4px 20px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
    --shadow-marker: 0 2px 8px rgba(0,0,0,0.18);
    --radius-card: 16px;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Geist', sans-serif;
    background: var(--bg);
    overflow: hidden;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ── MAP CONTAINER ── */
  #map-wrap {
    position: absolute;
    top: 16px; right: 16px; bottom: 16px;
    left: 76px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--map-border);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  #map { width: 100%; height: 100%; }

  /* ── NAV — no container, just icons on the white bg ── */
  #nav {
    position: absolute; left: 16px; top: 16px; bottom: 16px;
    width: 44px;
    display: flex; flex-direction: column; align-items: center;
    padding: 0;
    z-index: 100;
  }
  .nav-logo {
    width: 34px; flex-shrink: 0;
    /* Sits flush with the top of the map container (no padding offset) */
    margin-top: 0;
    margin-bottom: 0;
  }
  .nav-logo svg { width: 100%; height: auto; display: block; }
  .nav-spacer { flex: 1; }
  .nav-icons { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: transparent;
    color: var(--text-tertiary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .nav-btn:hover { color: var(--text-primary); background: #F0F0F0; border-radius: 50%; }
  .nav-btn.active { background: var(--text-primary); color: var(--white); border-radius: 50%; }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-version {
    font-size: 10px; color: var(--text-tertiary);
    letter-spacing: 0.02em; margin-top: 16px;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: absolute; top: 28px; right: 28px;
    display: flex; align-items: center; gap: 10px;
    z-index: 200;
  }
  #search-wrap { position: relative; display: flex; align-items: center; }
  #search-wrap .search-icon {
    position: absolute; left: 12px; width: 14px; height: 14px;
    color: var(--text-tertiary); pointer-events: none;
    display: flex; align-items: center; justify-content: center; z-index: 1;
  }
  #search-wrap .search-icon svg { width: 14px; height: 14px; display: block; }
  #search-wrap .search-clear {
    position: absolute; right: 10px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--text-tertiary); color: white; border: none;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    font-size: 10px; line-height: 1; padding: 0;
    transition: background 0.15s;
  }
  #search-wrap .search-clear:hover { background: var(--text-secondary); }
  #search-wrap.has-value .search-clear { display: flex; }
  #search {
    width: 240px; height: 38px; padding: 0 30px 0 34px;
    background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 24px; font-family: 'Geist', sans-serif;
    font-size: 13px; color: var(--text-primary); outline: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search::placeholder { color: var(--text-tertiary); }
  #search:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,139,255,0.12); }
  .toggle-group {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--text-secondary); white-space: nowrap;
  }
  .tog {
    width: 28px; height: 16px; background: var(--text-primary);
    border-radius: 8px; position: relative; cursor: pointer;
    transition: background 0.2s; flex-shrink: 0;
  }
  .tog::after {
    content: ''; position: absolute; width: 12px; height: 12px;
    background: white; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s;
  }
  .tog.right::after { transform: translateX(12px); }
  .topbar-div { width: 1px; height: 16px; background: rgba(0,0,0,0.12); }

  /* ── BOTTOM HINT ── */
  #hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--text-tertiary); pointer-events: none; z-index: 200;
  }

  /* ── MAP CONTROLS ── */
  #map-controls {
    position: absolute; bottom: 28px; right: 28px;
    display: flex; flex-direction: column; gap: 4px; z-index: 200;
  }
  .ctrl-group {
    background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px; overflow: hidden;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .ctrl-btn {
    width: 36px; height: 36px; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); transition: background 0.15s, color 0.15s;
  }
  .ctrl-btn:hover { background: rgba(0,0,0,0.04); color: var(--text-primary); }
  .ctrl-btn + .ctrl-btn { border-top: 1px solid rgba(0,0,0,0.07); }
  .ctrl-btn svg { width: 14px; height: 14px; }

  /* ── FLOATING CARD — positioned 16px inside the map edges ── */
  #card {
    position: absolute;
    /* 16px from left edge of map-wrap = nav(76px) + 16px gap inside map */
    top: 32px; /* 16px page edge + 16px inside map */
    left: 92px; /* 76px nav offset + 16px inside map */
    width: 380px;
    background: var(--white);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border);
    z-index: 300; display: none;
  }
  #card.visible { display: block; animation: cardIn 0.18s ease; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-5px) scale(0.985); }
    to   { opacity: 1; transform: none; }
  }
  .card-close {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: transparent; color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; line-height: 1;
    transition: background 0.15s, color 0.15s; z-index: 1;
  }
  .card-close:hover { background: #F0F0F0; color: var(--text-primary); }

  /* ── DETAIL CARD ── */
  #card-detail { padding: 24px; }
  .d-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .d-avatar {
    width: 60px; height: 60px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    background: #EFEFEF;
  }
  .d-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.2; color: var(--text-primary); }
  .d-role { font-size: 14px; color: var(--text-secondary); margin-top: 4px; font-weight: 400; }
  /* Single location row — city + country merged */
  .d-location {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .d-location svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--text-tertiary); }
  .time-block {
    background: var(--white); border-radius: 12px;
    border: 1px solid #EBEBEB;
    padding: 16px 18px; margin-bottom: 16px;
  }
  .time-val { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; color: var(--text-primary); }
  .time-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .time-lbl { font-size: 14px; color: var(--text-tertiary); font-weight: 400; }
  .time-diff { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 500; color: var(--blue); }
  .time-diff svg { width: 14px; height: 14px; }
  .d-stats { display: flex; flex-direction: column; gap: 12px; }
  .d-stat { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #313131; }
  .d-stat svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--text-tertiary); }

  /* ── COMPARE CARD ── */
  #card-compare { padding: 24px; display: none; }
  .cmp-top { display: flex; align-items: flex-start; margin-bottom: 18px; }
  .cmp-person { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .cmp-av { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); }
  .cmp-fn { font-size: 14px; font-weight: 600; }
  .cmp-ct { font-size: 12px; color: var(--text-secondary); text-align: center; }
  .cmp-mid { flex: 1; display: flex; align-items: center; padding: 0 6px; padding-bottom: 30px; }
  .cmp-mid svg { width: 100%; }
  .cmp-rows { display: flex; flex-direction: column; }
  .cmp-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .cmp-row:last-child { border-bottom: none; }
  .cmp-row svg { width: 14px; height: 14px; color: var(--text-tertiary); flex-shrink: 0; }
  .cmp-lbl { flex: 1; color: var(--text-secondary); }
  .cmp-val { font-weight: 600; }
  .cmp-val.blue { color: var(--blue); }

  /* ── TEAM LIST CARD ── */
  #card-list { padding: 24px; display: none; }
  .lst-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; padding-right: 32px; }
  .lst-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; margin-bottom: 20px; font-weight: 400; }
  .t-list { display: flex; flex-direction: column; gap: 0; max-height: 520px; overflow-y: auto; }
  .t-list::-webkit-scrollbar { width: 3px; }
  .t-list::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 2px; }
  .t-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 12px; border-radius: 12px; cursor: pointer;
    transition: background 0.12s; border: 1px solid transparent;
  }
  .t-row:hover { background: #F7F7F7; }
  .t-row.active { background: var(--blue-light); border-color: var(--blue-border); }
  .t-av { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .t-info { flex: 1; min-width: 0; }
  .t-name { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
  .t-loc {
    display: flex; align-items: center; gap: 5px;
    font-size: 14px; color: var(--text-secondary); margin-top: 3px;
  }
  .t-loc svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-secondary); }

  /* ── MAPBOX DEFAULT CONTROLS — hide ── */
  .mapboxgl-ctrl-bottom-right, .mapboxgl-ctrl-bottom-left,
  .mapboxgl-ctrl-top-right, .mapboxgl-ctrl-top-left { display: none !important; }

  /* ── AVATAR MARKERS ── */
  .av-marker {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; will-change: transform;
    /* NO animation here — animating on every zoom causes flicker */
  }
  .av-wrap {
    width: 38px; height: 38px; border-radius: 50%;
    /* 1px outside border via box-shadow so it doesn't affect layout */
    box-shadow: 0 0 0 1px #E9E9E9, var(--shadow-marker);
    overflow: hidden; background: #ddd;
    transition: box-shadow 0.15s; flex-shrink: 0;
  }
  .av-marker.selected .av-wrap {
    box-shadow: 0 0 0 2px var(--blue), var(--shadow-marker);
  }
  .av-marker:hover:not(.selected) .av-wrap {
    box-shadow: 0 0 0 2px rgba(0,139,255,0.4), var(--shadow-marker);
  }
  .av-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .av-initials {
    width: 100%; height: 100%; background: #444; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; font-family: 'Geist', sans-serif;
  }
  .av-name {
    margin-top: 3px; font-size: 11px; font-weight: 600;
    color: #333; font-family: 'Geist', sans-serif; white-space: nowrap;
    -webkit-text-stroke: 3px white; paint-order: stroke fill;
  }

  /* Cluster — fade in only when first appearing */
  .clust {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--blue); box-shadow: var(--shadow-marker);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 600;
    font-family: 'Geist', sans-serif; cursor: pointer; will-change: transform;
  }
  .clust:hover { background: #0079e0; }
  /* Only clusters get the fade — applied via JS class, not permanently in CSS */
  .clust.fadein { animation: markerFadeIn 0.2s ease forwards; }
  .av-marker.fadein { animation: markerFadeIn 0.2s ease forwards; }

  @keyframes markerFadeIn {
    from { opacity: 0; transform: scale(0.75); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(0,139,255,0.5), var(--shadow-marker); }
    60%  { box-shadow: 0 0 0 8px rgba(0,139,255,0), var(--shadow-marker); }
    100% { box-shadow: 0 0 0 0 rgba(0,139,255,0), var(--shadow-marker); }
  }
  .av-marker.pulse .av-wrap { animation: pulseRing 0.65s ease; }
</style>
</head>
<body>

<div id="map-wrap"><div id="map"></div></div>

<!-- NAV — no container, floats on white bg -->
<nav id="nav">
  <div class="nav-logo">
    <svg width="28" height="46" viewBox="0 0 28 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11.2046 32.7932V29.0584H15.7273V15.8113H11.2046V12.0764H24.3933V15.8113H19.8707V29.0584H24.3933V32.7932H11.2046Z" fill="#313131"/>

    </svg>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-icons">
    <button class="nav-btn active" id="nav-home" title="Home" onclick="navClick('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="nav-btn" id="nav-team" title="Team List" onclick="navClick('team')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button class="nav-btn" id="nav-cal" title="Upcoming Trips" onclick="navClick('cal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-version">V1.0</div>
</nav>

<!-- TOP BAR: search | divider | C°/F° | divider | Km/Mi -->
<div id="topbar">
  <div id="search-wrap">
    <div class="search-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <input id="search" type="text" placeholder="Search by name, location, etc" oninput="handleSearch(this.value)">
    <button class="search-clear" onclick="clearSearch()" title="Clear search">&#x2715;</button>
  </div>
  <div class="topbar-div"></div>
  <div class="toggle-group">
    <span>C°</span>
    <div class="tog" id="tog-temp" onclick="toggleTemp()"></div>
    <span>F°</span>
  </div>
  <div class="topbar-div"></div>
  <div class="toggle-group">
    <span>Km</span>
    <div class="tog" id="tog-dist" onclick="toggleDist()"></div>
    <span>Mi</span>
  </div>
</div>

<div id="hint">HOLD SHIFT + CLICK ON TWO PEOPLE TO COMPARE</div>

<!-- MAP CONTROLS — zoom only -->
<div id="map-controls">
  <div class="ctrl-group">
    <button class="ctrl-btn" onclick="map.zoomIn()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="ctrl-btn" onclick="map.zoomOut()">

<script>
const MY_TZ     = 'America/Argentina/Buenos_Aires';
const MY_COORDS = [-58.3816, -34.6037];

const TEAM = [
  { id:1,  firstName:'Nico',    name:'Nicolas Muino',    role:'UI Designer',      city:'San Carlos de Bariloche', country:'Argentina',     tz:'America/Argentina/Buenos_Aires', coords:[-71.3103,-41.1335], avatar:'https://i.pravatar.cc/150?img=11', weather:'22° C Partly Cloudy' },
  { id:2,  firstName:'Johanna', name:'Johanna Sequeira', role:'Brand Designer',   city:'Buenos Aires',            country:'Argentina',     tz:'America/Argentina/Buenos_Aires', coords:[-58.3816,-34.6037], avatar:'https://i.pravatar.cc/150?img=47', weather:'19° C Sunny' },
  { id:3,  firstName:'Cami',    name:'Camila Torres',    role:'UX Researcher',    city:'São Paulo',               country:'Brazil',        tz:'America/Sao_Paulo',              coords:[-46.6333,-23.5505], avatar:'https://i.pravatar.cc/150?img=44', weather:'28° C Humid' },
  { id:4,  firstName:'Erin',    name:'Erin Ziebart',     role:'Motion Designer',  city:'Eugene, Oregon',          country:'United States', tz:'America/Los_Angeles',            coords:[-123.0868,44.0521], avatar:'https://i.pravatar.cc/150?img=49', weather:'15° C Cloudy' },
  { id:5,  firstName:'Mike',    name:'Mike Cuesta',      role:'Art Director',     city:'Miami, Florida',          country:'United States', tz:'America/New_York',               coords:[-80.1918,25.7617],  avatar:'https://i.pravatar.cc/150?img=12', weather:'31° C Clear' },
  { id:6,  firstName:'Juan',    name:'Juan Molina',      role:'Senior Designer',  city:'Miami, Florida',          country:'United States', tz:'America/New_York',               coords:[-80.3,25.85],       avatar:'https://i.pravatar.cc/150?img=15', weather:'31° C Clear' },
  { id:7,  firstName:'Dani',    name:'Dani Menendez',    role:'Visual Designer',  city:'Miami, Florida',          country:'United States', tz:'America/New_York',               coords:[-80.25,25.78],      avatar:'https://i.pravatar.cc/150?img=36', weather:'31° C Clear' },
  { id:8,  firstName:'Molly',   name:'Molly Brennan',    role:'Product Designer', city:'New York',                country:'United States', tz:'America/New_York',               coords:[-74.006,40.7128],   avatar:null, initials:'MB', weather:'12° C Overcast' },
  { id:9,  firstName:'Lauren',  name:'Lauren De Leo',    role:'Design Lead',      city:'Copenhagen',              country:'Denmark',       tz:'Europe/Copenhagen',              coords:[12.5683,55.6761],   avatar:'https://i.pravatar.cc/150?img=25', weather:'8° C Windy' },
  { id:10, firstName:'Liz',     name:'Liz Hixon',        role:'Visual Designer',  city:'Beirut',                  country:'Lebanon',       tz:'Asia/Beirut',                    coords:[35.5018,33.8938],   avatar:'https://i.pravatar.cc/150?img=32', weather:'24° C Clear' },
];

let selectedId = null, compareId = null, cardMode = null;
let useFahr = false, useKm = true;
let avMarkers = {}, clustMkrs = [], hasCmpLine = false, timerId = null;

// ── MAP ──
mapboxgl.accessToken = 'pk.eyJ1Ijoia2xhdXNhYmlvIiwiYSI6ImNtbXplbjhoaDA3d3QycXE1bWlvMXlzN24ifQ.wFDHwp10NfYWSS9-chSbJQ';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/klausabio/cmmza8gte00cy01s671x4b1nr',
  center: [10, 25], zoom: 1.8,
  minZoom: 1.2, maxZoom: 14,
  projection: 'mercator',
  config: {
    basemap: {
      theme: 'monochrome',
      lightPreset: 'day',
      font: 'Inter',
      colorLand: '#f2f2f2',
      colorWater: '#d9d9d9',
      colorPlaceLabels: '#808080',
      colorAdminBoundaries: '#cccccc',
      showPlaceLabels: true,
      showAdminBoundaries: true,
      showRoadLabels: false,
      showTransitLabels: false,
      densityPointOfInterestLabels: 0
    }
  }
});

map.on('load', () => {
  initMarkers();
  updateClusters();

  map.on('click', e => {
    if (e.originalEvent.target === map.getCanvas() && cardMode === 'compare') closeCard();
  });

  let lastBand = getZoomBand(map.getZoom());
  map.on('zoom', () => {
    const band = getZoomBand(map.getZoom());
    if (band !== lastBand) { lastBand = band; updateClusters(); }
  });
});

// Returns a discrete "band" string based on which cluster thresholds are active
function getZoomBand(zoom) {
  if (zoom >= 5)   return 'individual';
  if (zoom >= 3.5) return 'close';
  if (zoom >= 2.5) return 'medium';
  return 'far';
}


// ── MARKERS ──
// Avatar markers are created ONCE on load and never removed.
// Showing/hiding is done via CSS display — no DOM teardown, no flicker.
// Only cluster markers are recreated when groupings change.

function initMarkers() {
  // Create every avatar marker once
  TEAM.forEach(p => mkAvatar(p));
}

function mkAvatar(p) {
  const el = document.createElement('div');
  el.className = 'av-marker';
  const inner = p.avatar
    ? `<img src="${p.avatar}" alt="${p.firstName}" loading="lazy">`
    : `<div class="av-initials">${p.initials}</div>`;
  el.innerHTML = `<div class="av-wrap">${inner}</div><div class="av-name">${p.firstName}</div>`;
  el.addEventListener('click', e => {
    e.stopPropagation();
    e.shiftKey && selectedId && selectedId !== p.id
      ? triggerCompare(p.id) : selectPerson(p.id);
  });
  const marker = new mapboxgl.Marker({ element: el, anchor: 'top', offset: [0, -44] })
    .setLngLat(p.coords).addTo(map);
  avMarkers[p.id] = { marker, el };
}

// Cluster groupings — only recreate cluster bubbles when groupings change
let lastClusterKey = '';

function clusterKey(groups) {
  return groups.map(g => g.map(p => p.id).sort().join(',')).sort().join('|');
}

function updateClusters() {
  const zoom = map.getZoom();
  const groups = cluster(TEAM, zoom);
  const key = clusterKey(groups);
  if (key === lastClusterKey) return; // nothing changed
  lastClusterKey = key;

  // Remove old cluster bubbles
  clustMkrs.forEach(m => m.remove());
  clustMkrs = [];

  // Figure out which person IDs are clustered
  const clusteredIds = new Set();
  groups.forEach(g => { if (g.length > 1) g.forEach(p => clusteredIds.add(p.id)); });

  // Show/hide avatar markers based on whether they're in a cluster
  TEAM.forEach(p => {
    const el = avMarkers[p.id]?.el;
    if (el) el.style.display = clusteredIds.has(p.id) ? 'none' : 'flex';
  });

  // Create new cluster bubbles for grouped people
  groups.forEach(g => { if (g.length > 1) mkCluster(g); });

  // Restore selection state
  if (selectedId && avMarkers[selectedId]) avMarkers[selectedId].el.classList.add('selected');
  if (compareId  && avMarkers[compareId])  avMarkers[compareId].el.classList.add('selected');
}

function mkCluster(group) {
  const el = document.createElement('div');
  el.className = 'clust fadein';
  el.textContent = group.length;
  el.addEventListener('animationend', () => el.classList.remove('fadein'), { once: true });
  el.addEventListener('click', e => {
    e.stopPropagation();
    const b = new mapboxgl.LngLatBounds();
    group.forEach(p => b.extend(p.coords));
    map.fitBounds(b, { padding: 140, maxZoom: 8, duration: 700 });
  });
  const lng = group.reduce((s, p) => s + p.coords[0], 0) / group.length;
  const lat = group.reduce((s, p) => s + p.coords[1], 0) / group.length;
  const m = new mapboxgl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat]).addTo(map);
  clustMkrs.push(m);
}

function cluster(team, zoom) {
  if (zoom >= 5) return team.map(p => [p]);
  const thresh = zoom < 2.5 ? 20 : zoom < 3.5 ? 13 : 7;
  const used = new Set(), groups = [];
  team.forEach((p, i) => {
    if (used.has(i)) return;
    const g = [p]; used.add(i);
    team.forEach((q, j) => {
      if (i === j || used.has(j)) return;
      if (Math.hypot(p.coords[0]-q.coords[0], p.coords[1]-q.coords[1]) < thresh) {
        g.push(q); used.add(j);
      }
    });
    groups.push(g);
  });
  return groups;
}

// ── SELECTION ──
function selectPerson(id) {
  if (selectedId && avMarkers[selectedId]) avMarkers[selectedId].el.classList.remove('selected');
  if (compareId  && avMarkers[compareId])  avMarkers[compareId].el.classList.remove('selected');
  if (hasCmpLine) removeCmpLine();
  selectedId = id; compareId = null;
  if (avMarkers[id]) avMarkers[id].el.classList.add('selected');
  const p = TEAM.find(x => x.id === id); if (!p) return;
  showDetail(p);
  map.flyTo({ center: p.coords, zoom: Math.max(map.getZoom(), 5), duration: 700 });
  document.getElementById('hint').textContent = 'HOLD SHIFT + CLICK ON ANOTHER PERSON TO COMPARE';
  syncListActive(id);
}

function triggerCompare(id2) {
  compareId = id2;
  if (avMarkers[id2]) avMarkers[id2].el.classList.add('selected');
  const p1 = TEAM.find(x => x.id === selectedId), p2 = TEAM.find(x => x.id === id2);
  if (!p1 || !p2) return;
  showCompare(p1, p2); drawCmpLine(p1, p2);
  const b = new mapboxgl.LngLatBounds(); b.extend(p1.coords); b.extend(p2.coords);
  map.fitBounds(b, { padding: 200, maxZoom: 9, duration: 800 });
  document.getElementById('hint').textContent = 'CLICK ANYWHERE TO CLOSE COMPARISON';
}

// ── CARDS ──
function showDetail(p) {
  cardMode = 'detail';
  document.getElementById('card-detail').style.display = 'block';
  document.getElementById('card-compare').style.display = 'none';
  document.getElementById('card-list').style.display = 'none';
  document.getElementById('card').classList.add('visible');
  const fb = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=444&color=fff&size=128`;
  document.getElementById('d-av').src = p.avatar || fb;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-role').textContent = p.role;
  document.getElementById('d-location').textContent = `${p.city}, ${p.country}`;
  document.getElementById('d-weather').textContent = fmtWeather(p.weather);
  refreshTime(p);
  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => refreshTime(p), 15000);
}

function refreshTime(p) {
  document.getElementById('d-time').textContent = new Intl.DateTimeFormat('en-US', { timeZone: p.tz, hour: 'numeric', minute: '2-digit', hour12: true }).format(new Date());
  const diff = tzDiff(MY_TZ, p.tz);
  document.getElementById('d-diff').textContent = diff === 0 ? 'Same time zone' : diff > 0 ? `+${diff}h from you` : `${diff}h from you`;
  document.getElementById('d-dist').textContent = fmtDist(haversine(MY_COORDS, p.coords));
}

function showCompare(p1, p2) {
  cardMode = 'compare';
  document.getElementById('card-detail').style.display = 'none';
  document.getElementById('card-compare').style.display = 'block';
  document.getElementById('card-list').style.display = 'none';
  document.getElementById('card').classList.add('visible');
  const fb = p => `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=444&color=fff&size=128`;
  document.getElementById('c-av1').src = p1.avatar || fb(p1);
  document.getElementById('c-av2').src = p2.avatar || fb(p2);
  document.getElementById('c-n1').textContent = p1.firstName;
  document.getElementById('c-n2').textContent = p2.firstName;
  document.getElementById('c-c1').textContent = p1.city;
  document.getElementById('c-c2').textContent = p2.city;
  document.getElementById('c-dist').textContent = fmtDist(haversine(p1.coords, p2.coords));
  const diff = tzDiff(p1.tz, p2.tz);
  document.getElementById('c-tdiff').textContent = diff === 0 ? 'Same time zone' : diff > 0 ? `+${diff}h` : `${diff}h`;
  document.getElementById('c-overlap').textContent = `${Math.max(0, 8 - Math.abs(diff))}h overlap`;
}

function showList() {
  cardMode = 'list';
  document.getElementById('card-detail').style.display = 'none';
  document.getElementById('card-compare').style.display = 'none';
  document.getElementById('card-list').style.display = 'block';
  document.getElementById('card').classList.add('visible');
  document.getElementById('lst-sub').textContent = `${TEAM.length} people across the globe`;
  const el = document.getElementById('t-list');
  el.innerHTML = '';
  TEAM.forEach(p => {
    const row = document.createElement('div');
    row.className = 't-row' + (selectedId === p.id ? ' active' : '');
    row.dataset.id = p.id;
    const fb = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=444&color=fff&size=96`;
    row.innerHTML = `
      <img class="t-av" src="${p.avatar || fb}" alt="${p.name}" loading="lazy">
      <div class="t-info">
        <div class="t-name">${p.name}</div>
        <div class="t-loc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${p.city}, ${p.country}
        </div>
      </div>`;
    row.addEventListener('mouseenter', () => {
      const m = avMarkers[p.id];
      if (m) { m.el.classList.add('pulse'); setTimeout(() => m.el.classList.remove('pulse'), 700); }
    });
    row.addEventListener('click', () => { closeCard(); setTimeout(() => selectPerson(p.id), 80); });
    el.appendChild(row);
  });
}

function syncListActive(id) {
  document.querySelectorAll('.t-row').forEach(r => r.classList.toggle('active', +r.dataset.id === id));
}

function closeCard() {
  document.getElementById('card').classList.remove('visible');
  if (selectedId && avMarkers[selectedId]) avMarkers[selectedId].el.classList.remove('selected');
  if (compareId  && avMarkers[compareId])  avMarkers[compareId].el.classList.remove('selected');
  if (hasCmpLine) removeCmpLine();
  if (timerId) { clearInterval(timerId); timerId = null; }
  selectedId = compareId = cardMode = null;
  document.getElementById('hint').textContent = 'HOLD SHIFT + CLICK ON TWO PEOPLE TO COMPARE';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
  resetMapView();
}

// ── COMPARE LINE ──
function drawCmpLine(p1, p2) {
  removeCmpLine();
  map.addSource('cl', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:[p1.coords,p2.coords] } } });
  map.addLayer({ id:'cl', type:'line', source:'cl', paint:{ 'line-color':'#008BFF','line-width':2,'line-dasharray':[3,2.5],'line-opacity':0.85 } });
  hasCmpLine = true;
}
function removeCmpLine() {
  if (map.getLayer('cl')) map.removeLayer('cl');
  if (map.getSource('cl')) map.removeSource('cl');
  hasCmpLine = false;
}

// ── NAV ──
function navClick(section) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + section)?.classList.add('active');
  if (section === 'team') showList();
  else if (section === 'home') {
    if (cardMode) closeCard();
    clearSearch();
    resetMapView();
  }
}

function resetMapView() {
  map.flyTo({ center: [10, 25], zoom: 1.8, duration: 900 });
}

// ── SEARCH ──
function handleSearch(v) {
  const wrap = document.getElementById('search-wrap');
  wrap.classList.toggle('has-value', v.length > 0);
  const q = v.trim().toLowerCase(); if (!q) return;
  const m = TEAM.find(p =>
    p.name.toLowerCase().includes(q) ||
    p.city.toLowerCase().includes(q) ||
    p.country.toLowerCase().includes(q)
  );
  if (m) selectPerson(m.id);
}

function clearSearch() {
  const input = document.getElementById('search');
  input.value = '';
  document.getElementById('search-wrap').classList.remove('has-value');
  if (cardMode) closeCard();
  resetMapView();
}

// ── UNITS ──
function toggleTemp() {
  useFahr = !useFahr;
  document.getElementById('tog-temp').classList.toggle('right', useFahr);
  if (selectedId && cardMode === 'detail') { const p = TEAM.find(x=>x.id===selectedId); if(p) document.getElementById('d-weather').textContent = fmtWeather(p.weather); }
}
function toggleDist() {
  useKm = !useKm;
  document.getElementById('tog-dist').classList.toggle('right', !useKm);
  if (selectedId) {
    const p = TEAM.find(x=>x.id===selectedId), p2 = compareId ? TEAM.find(x=>x.id===compareId) : null;
    if (p && cardMode==='detail')   document.getElementById('d-dist').textContent  = fmtDist(haversine(MY_COORDS, p.coords));
    if (p && p2 && cardMode==='compare') document.getElementById('c-dist').textContent = fmtDist(haversine(p.coords, p2.coords));
  }
}

// ── UTILS ──
function haversine([lo1,la1],[lo2,la2]) {
  const R=6371,r=Math.PI/180,dLa=(la2-la1)*r,dLo=(lo2-lo1)*r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(km) { return useKm ? `${Math.round(km).toLocaleString()} km away` : `${Math.round(km*0.621371).toLocaleString()} mi away`; }
function tzDiff(tz1,tz2) {
  const off=tz=>{const s=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||'GMT+0';const m=s.match(/GMT([+-])(\d+)(?::(\d+))?/);if(!m)return 0;return(m[1]==='+'?1:-1)*(+m[2]+(+m[3]||0)/60);};
  return Math.round(off(tz2)-off(tz1));
}
function fmtWeather(s) { return useFahr ? s.replace(/(\d+)°\s*C/,(_,c)=>`${Math.round(+c*9/5+32)}° F`) : s; }
